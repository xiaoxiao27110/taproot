name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taproot-plugin/package-lock.json
      - name: Build Python distributions
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
      - name: Build VSIX
        working-directory: taproot-plugin
        run: |
          npm ci
          npm run package:vsix
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*
            taproot-plugin/*.vsix

  publish-pypi:
    name: Publish PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-marketplace:
    name: Publish VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Publish VSIX
        run: npx --yes @vscode/vsce@3.9.2 publish --packagePath taproot-plugin/*.vsix -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
