name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish Python distributions to PyPI"
        required: true
        default: false
        type: boolean
      publish_marketplace:
        description: "Publish VSIX to VS Code Marketplace"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taproot-plugin/package-lock.json
      - name: Build Python distributions
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
      - name: Build VSIX
        working-directory: taproot-plugin
        run: |
          npm ci
          npm run package:vsix
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*
            taproot-plugin/*.vsix

  github-release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          Taproot ${TAG}

          Assets:
          - Python source distribution and wheel for taproot-mcp
          - VS Code extension VSIX for Taproot

          Install the Python package with:

          \`\`\`bash
          python -m pip install taproot-mcp
          \`\`\`
          EOF
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Taproot ${TAG}" \
            --notes-file release-notes.md \
            dist/* taproot-plugin/*.vsix

  publish-pypi:
    name: Publish PyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-marketplace:
    name: Publish VS Code Marketplace
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_marketplace
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Publish VSIX
        run: npx --yes @vscode/vsce@3.9.2 publish --packagePath taproot-plugin/*.vsix -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
