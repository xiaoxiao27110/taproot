name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Test
        run: python -m pytest

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taproot-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taproot-plugin/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Audit runtime dependencies
        run: npm audit --omit=dev
      - name: Package and verify VSIX
        run: npm run package:vsix
