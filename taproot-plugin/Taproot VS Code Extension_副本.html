  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ive:#1f1f1f; --activitybar-active-border:#005fb8;\n    --titlebar-bg:#dddddd; --titlebar-fg:#333333;\n    --fg:#3b3b3b; --fg-muted:#6c6c6c; --fg-desc:#767676; --section-header:#6f6f6f;\n    --divider:#e5e5e5;\n    --input-bg:#ffffff; --input-fg:#3b3b3b; --input-border:#cecece; --input-focus:#005fb8; --input-placeholder:#767676;\n    --btn-bg:#005fb8; --btn-bg-hover:#0258a8; --btn-fg:#ffffff; --btn2-bg:#e5e5e5; --btn2-bg-hover:#dcdcdc; --btn2-fg:#3b3b3b;\n    --list-hover:#e8e8e8; --list-active:#cce0ff; --list-active-fg:#000000;\n    --tab-active-bg:#ffffff; --tab-inactive-bg:#ececec; --tab-active-fg:#333333; --tab-inactive-fg:#6f6f6f; --tab-top:#005fb8;\n    --badge-bg:#c4c4c4; --badge-fg:#333333; --chip-bg:#dcdcdc; --chip-fg:#3b3b3b;\n    --card-bg:#ffffff; --card-border:#e0e0e0; --panel-bg:#f8f8f8;\n    --green:#2da44e; --yellow:#bf8803; --red:#cd3131; --gray:#a0a0a0;\n    --accent:#005fb8; --link:#006ab1; --track:#e4e4e4;\n    --shadow:0 4px 14px rgba(0,0,0,.18);\n  }\n  *{box-sizing:border-box} html,body{margin:0;padding:0;height:100%}\n  input,button,textarea{font-family:inherit}\n  input:focus{outline:1px solid var(--input-focus);outline-offset:-1px}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:rgba(120,120,120,.4);border-radius:6px}\n  ::-webkit-scrollbar-track{background:transparent}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-theme=\"{{ themeAttr }}\" style=\"position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);color:var(--fg);font-family:'Segoe UI','SF Pro Text',system-ui,-apple-system,sans-serif;font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased\">\n\n  <!-- TITLE BAR -->\n  <div style=\"height:30px;flex:none;background:var(--titlebar-bg);color:var(--titlebar-fg);display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-size:12px;user-select:none;border-bottom:1px solid var(--divider)\">\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <span class=\"codicon codicon-vscode\" style=\"font-size:15px;color:#3794ff\"><\u002Fspan>\n      <div style=\"display:flex;gap:14px;opacity:.85\"><span>File<\u002Fspan><span>Edit<\u002Fspan><span>Selection<\u002Fspan><span>View<\u002Fspan><span>Go<\u002Fspan><span>Terminal<\u002Fspan><span>Help<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;left:0;right:0;text-align:center;pointer-events:none;opacity:.85\">nodes.yaml — taproot — Visual Studio Code<\u002Fdiv>\n    <div style=\"display:flex;gap:16px;align-items:center;z-index:1\">\n      <span class=\"codicon codicon-chrome-minimize\" style=\"font-size:11px;opacity:.8\"><\u002Fspan>\n      <span class=\"codicon codicon-chrome-maximize\" style=\"font-size:11px;opacity:.8\"><\u002Fspan>\n      <span class=\"codicon codicon-chrome-close\" style=\"font-size:11px;opacity:.8\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"flex:1;display:flex;min-height:0\">\n\n    <!-- ACTIVITY BAR -->\n    <div style=\"width:48px;flex:none;background:var(--activitybar-bg);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:6px 0\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;width:100%\">\n        <div title=\"Taproot\" style=\"position:relative;width:100%;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer\">\n          <div style=\"position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--activitybar-active-border)\"><\u002Fdiv>\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--activitybar-fg-active)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <circle cx=\"12\" cy=\"4.4\" r=\"2.1\"><\u002Fcircle>\n            <path d=\"M12 6.5 V12\"><\u002Fpath>\n            <path d=\"M12 12 C12 16,6.5 16.5,5.5 21\"><\u002Fpath>\n            <path d=\"M12 12 C12 16,17.5 16.5,18.5 21\"><\u002Fpath>\n            <path d=\"M12 12 V21\"><\u002Fpath>\n            <path d=\"M8.8 17.5 L7.6 20.4\"><\u002Fpath>\n            <path d=\"M15.2 17.5 L16.4 20.4\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"height:48px;display:flex;align-items:center;justify-content:center\"><span class=\"codicon codicon-files\" style=\"font-size:22px;color:var(--activitybar-fg)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"height:48px;display:flex;align-items:center;justify-content:center\"><span class=\"codicon codicon-search\" style=\"font-size:22px;color:var(--activitybar-fg)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"height:48px;display:flex;align-items:center;justify-content:center\"><span class=\"codicon codicon-source-control\" style=\"font-size:22px;color:var(--activitybar-fg)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"height:48px;display:flex;align-items:center;justify-content:center\"><span class=\"codicon codicon-debug-alt\" style=\"font-size:22px;color:var(--activitybar-fg)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"height:48px;display:flex;align-items:center;justify-content:center\"><span class=\"codicon codicon-extensions\" style=\"font-size:22px;color:var(--activitybar-fg)\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;width:100%\">\n        <div style=\"height:48px;display:flex;align-items:center;justify-content:center\"><span class=\"codicon codicon-account\" style=\"font-size:22px;color:var(--activitybar-fg)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"height:48px;display:flex;align-items:center;justify-content:center\"><span class=\"codicon codicon-settings-gear\" style=\"font-size:22px;color:var(--activitybar-fg)\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SIDEBAR -->\n    <div data-screen-label=\"Sidebar Tree View\" style=\"width:300px;flex:none;background:var(--sidebar-bg);display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--divider)\">\n      <div style=\"height:35px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 8px 0 20px\">\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--section-header);text-transform:uppercase\">Taproot Nodes<\u002Fspan>\n        <div style=\"display:flex;gap:2px;align-items:center\">\n          <span title=\"刷新全部\" onclick=\"{{ refreshAll }}\" class=\"codicon codicon-refresh\" style=\"font-size:16px;padding:4px;border-radius:5px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover)\"><\u002Fspan>\n          <span title=\"按标签过滤\" onclick=\"{{ toggleFilter }}\" class=\"codicon codicon-filter\" style=\"font-size:16px;padding:4px;border-radius:5px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover)\"><\u002Fspan>\n          <span title=\"打开配置编辑器\" onclick=\"{{ openConfig }}\" class=\"codicon codicon-gear\" style=\"font-size:16px;padding:4px;border-radius:5px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover)\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- filter dropdown -->\n      <sc-if value=\"{{ showFilter }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin:0 10px 6px 20px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;box-shadow:var(--shadow);overflow:hidden;font-size:12px\">\n          <div style=\"padding:5px 10px;color:var(--fg-muted);font-size:11px;border-bottom:1px solid var(--divider)\">按标签过滤<\u002Fdiv>\n          <sc-for list=\"{{ filterOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ opt.onPick }}\" style=\"padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--fg)\" style-hover=\"background:var(--list-hover)\">\n              <span class=\"codicon {{ opt.icon }}\" style=\"font-size:13px;color:var(--accent)\"><\u002Fspan>\n              <span>{{ opt.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- active filter badge -->\n      <sc-if value=\"{{ hasFilter }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin:0 10px 4px 20px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--accent)\">\n          <span class=\"codicon codicon-filter-filled\" style=\"font-size:12px\"><\u002Fspan>\n          <span>{{ filterLabel }}<\u002Fspan>\n          <span onclick=\"{{ clearFilter }}\" class=\"codicon codicon-close\" style=\"font-size:11px;cursor:pointer;opacity:.7\" style-hover=\"opacity:1\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- tree rows -->\n      <div style=\"flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:8px\">\n        <sc-for list=\"{{ treeRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ row.onClick }}\" oncontextmenu=\"{{ row.onCtx }}\" onmouseenter=\"{{ row.onHover }}\" onmouseleave=\"{{ row.onLeave }}\" style=\"display:flex;align-items:center;height:22px;padding:0 8px 0 12px;cursor:pointer;background:{{ row.bg }};color:{{ row.fg }};border-left:{{ row.leftBar }}\" style-hover=\"background:var(--list-hover)\">\n            <!-- dot -->\n            <sc-if value=\"{{ row.showDot }}\" hint-placeholder-val=\"{{ true }}\">\n              <span style=\"width:8px;height:8px;border-radius:50%;flex:none;margin-right:7px;background:{{ row.statusColor }}\"><\u002Fspan>\n            <\u002Fsc-if>\n            <!-- icon -->\n            <sc-if value=\"{{ row.showIcon }}\" hint-placeholder-val=\"{{ false }}\">\n              <span class=\"codicon {{ row.statusIcon }}\" style=\"font-size:14px;flex:none;margin-right:6px;color:{{ row.statusColor }}\"><\u002Fspan>\n            <\u002Fsc-if>\n            <span style=\"font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none;max-width:100px\">{{ row.name }}<\u002Fspan>\n            <span style=\"font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;color:var(--fg-desc);margin-left:8px;flex:none;white-space:nowrap\">{{ row.userHost }}<\u002Fspan>\n            <sc-if value=\"{{ row.isError }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size:11px;color:var(--red);margin-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ row.error }}<\u002Fspan>\n            <\u002Fsc-if>\n            <div style=\"display:flex;gap:4px;margin-left:auto;align-items:center;overflow:hidden;flex:none\">\n              <sc-for list=\"{{ row.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                <span style=\"font-size:10px;background:var(--chip-bg);color:var(--chip-fg);padding:1px 5px;border-radius:3px;white-space:nowrap\">{{ tag }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EDITOR AREA -->\n    <div style=\"flex:1;display:flex;flex-direction:column;min-width:0;background:var(--editor-bg)\">\n      <!-- tabs -->\n      <div style=\"height:35px;flex:none;display:flex;background:var(--tab-inactive-bg);align-items:stretch\">\n        <div onclick=\"{{ showConfig }}\" style=\"display:flex;align-items:center;gap:7px;padding:0 12px;cursor:pointer;background:{{ tab.configBg }};color:{{ tab.configFg }};border-top:1px solid {{ tab.configTop }};border-right:1px solid var(--divider);max-width:220px\">\n          <span class=\"codicon codicon-settings\" style=\"font-size:14px;color:var(--accent)\"><\u002Fspan>\n          <span style=\"font-size:13px;white-space:nowrap\">Nodes 配置编辑器<\u002Fspan>\n          <span class=\"codicon codicon-close\" style=\"font-size:13px;margin-left:6px;opacity:.6\"><\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ showDetail }}\" style=\"display:flex;align-items:center;gap:7px;padding:0 12px;cursor:pointer;background:{{ tab.detailBg }};color:{{ tab.detailFg }};border-top:1px solid {{ tab.detailTop }};border-right:1px solid var(--divider);max-width:240px\">\n          <span class=\"codicon codicon-server\" style=\"font-size:14px;color:var(--accent)\"><\u002Fspan>\n          <span style=\"font-size:13px;white-space:nowrap\">{{ detail.name }} · 详情<\u002Fspan>\n          <span class=\"codicon codicon-close\" style=\"font-size:13px;margin-left:6px;opacity:.6\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- breadcrumb -->\n      <div style=\"height:24px;flex:none;display:flex;align-items:center;gap:6px;padding:0 18px;color:var(--fg-desc);font-size:12px;border-bottom:1px solid var(--divider)\">\n        <span class=\"codicon codicon-root-folder\" style=\"font-size:13px\"><\u002Fspan>\n        <span>taproot<\u002Fspan><span class=\"codicon codicon-chevron-right\" style=\"font-size:11px;opacity:.6\"><\u002Fspan>\n        <span>{{ breadcrumb }}<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- CONTENT -->\n      <div style=\"flex:1;overflow-y:auto;min-height:0\">\n\n        <!-- CONFIG EDITOR -->\n        <sc-if value=\"{{ isConfig }}\" hint-placeholder-val=\"{{ true }}\">\n        <div data-screen-label=\"Config Editor\" style=\"max-width:920px;margin:0 auto;padding:26px 32px 80px\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:4px\">\n            <div>\n              <h1 style=\"margin:0;font-size:22px;font-weight:600;color:var(--fg)\">节点配置编辑器<\u002Fh1>\n              <div style=\"margin:6px 0 0;color:var(--fg-muted);font-size:13px\">可视化编辑 <span style=\"font-family:'SF Mono',Menlo,monospace;color:var(--fg-desc)\">nodes.yaml<\u002Fspan>，保存后写回配置文件并刷新侧边栏。<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px;color:var(--green);font-size:12px;white-space:nowrap;padding-top:6px\">\n              <span class=\"codicon codicon-plug\" style=\"font-size:14px\"><\u002Fspan> taproot-mcp 已连接\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- DEFAULTS -->\n          <div style=\"margin-top:22px;background:var(--panel-bg);border:1px solid var(--card-border);border-radius:8px;padding:16px 18px\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px\">\n              <span class=\"codicon codicon-globe\" style=\"font-size:15px;color:var(--accent)\"><\u002Fspan>\n              <span style=\"font-weight:600;font-size:14px\">全局默认值 (defaults)<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"color:var(--fg-muted);font-size:12px;margin-bottom:14px\">以下值为所有节点的默认配置，单个节点可覆盖。<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px\">\n              <div style=\"display:flex;flex-direction:column;gap:5px\">\n                <label style=\"font-size:11px;color:var(--fg-muted)\">SSH 用户名<\u002Flabel>\n                <input value=\"{{ defaults.user }}\" oninput=\"{{ defaults.onUser }}\" style=\"background:var(--input-bg);color:var(--input-fg);border:1px solid var(--input-border);border-radius:4px;padding:6px 8px;font-size:13px\">\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:5px\">\n                <label style=\"font-size:11px;color:var(--fg-muted)\">SSH 端口<\u002Flabel>\n                <input value=\"{{ defaults.port }}\" oninput=\"{{ defaults.onPort }}\" style=\"background:var(--input-bg);color:var(--input-fg);border:1px solid var(--input-border);border-radius:4px;padding:6px 8px;font-size:13px\">\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:5px\">\n                <label style=\"font-size:11px;color:var(--fg-muted)\">密码<\u002Flabel>\n                <div style=\"display:flex;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;overflow:hidden\">\n                  <input type=\"{{ defaults.pwdType }}\" value=\"{{ defaults.pwd }}\" oninput=\"{{ defaults.onPwd }}\" placeholder=\"••••••••\" style=\"flex:1;min-width:0;background:transparent;color:var(--input-fg);border:none;padding:6px 8px;font-size:13px\">\n                  <span onclick=\"{{ defaults.onTogglePwd }}\" class=\"codicon {{ defaults.pwdEye }}\" style=\"font-size:14px;padding:7px 8px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover)\"><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:5px\">\n                <label style=\"font-size:11px;color:var(--fg-muted)\">sudo 密码<\u002Flabel>\n                <div style=\"display:flex;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;overflow:hidden\">\n                  <input type=\"{{ defaults.sudoType }}\" value=\"{{ defaults.sudo }}\" oninput=\"{{ defaults.onSudo }}\" placeholder=\"继承密码\" style=\"flex:1;min-width:0;background:transparent;color:var(--input-fg);border:none;padding:6px 8px;font-size:13px\">\n                  <span onclick=\"{{ defaults.onToggleSudo }}\" class=\"codicon {{ defaults.sudoEye }}\" style=\"font-size:14px;padding:7px 8px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover)\"><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- NODES HEADER -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin:26px 2px 12px\">\n            <span style=\"font-weight:600;font-size:14px\">节点 <span style=\"color:var(--fg-muted);font-weight:400\">({{ nodeCount }})<\u002Fspan><\u002Fspan>\n            <span style=\"font-size:12px;color:var(--fg-muted);display:flex;align-items:center;gap:6px\"><span style=\"width:7px;height:7px;border-radius:2px;background:var(--accent)\"><\u002Fspan>蓝色圆点 = 覆盖了默认值<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- EMPTY STATE -->\n          <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border:1.5px dashed var(--card-border);border-radius:10px;padding:54px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px\">\n              <span class=\"codicon codicon-server-environment\" style=\"font-size:38px;color:var(--fg-muted);opacity:.7\"><\u002Fspan>\n              <div style=\"color:var(--fg);font-size:15px;font-weight:500\">还没有配置任何节点<\u002Fdiv>\n              <div style=\"color:var(--fg-muted);font-size:13px;max-width:360px\">添加一个远端节点开始构建你的集群。<\u002Fdiv>\n              <button onclick=\"{{ addNode }}\" style=\"margin-top:4px;display:flex;align-items:center;gap:7px;background:var(--btn-bg);color:var(--btn-fg);border:none;border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer\" style-hover=\"background:var(--btn-bg-hover)\"><span class=\"codicon codicon-add\" style=\"font-size:14px\"><\u002Fspan>添加节点<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- CARDS -->\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ nodeVMs }}\" as=\"node\" hint-placeholder-count=\"3\">\n              <div style=\"background:var(--card-bg);border:1px solid {{ node.cardBorder }};border-radius:8px;padding:16px 18px\">\n                <!-- header -->\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n                  <span class=\"codicon {{ node.typeIcon }}\" style=\"font-size:17px;color:var(--accent)\"><\u002Fspan>\n                  <input value=\"{{ node.name }}\" oninput=\"{{ node.onName }}\" style=\"font-weight:700;font-size:15px;background:transparent;color:var(--fg);border:1px solid transparent;border-radius:4px;padding:3px 6px;width:200px\" style-hover=\"border-color:var(--input-border)\" style-focus=\"border-color:var(--input-focus);background:var(--input-bg)\">\n                  <sc-if value=\"{{ node.dupName }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size:11px;color:var(--red);display:flex;align-items:center;gap:4px\"><span class=\"codicon codicon-error\" style=\"font-size:12px\"><\u002Fspan>名称重复<\u002Fspan>\n                  <\u002Fsc-if>\n                  <div style=\"margin-left:auto;display:flex;align-items:center;gap:10px\">\n                    <sc-if value=\"{{ node.testPass }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;color:var(--green);display:flex;align-items:center;gap:5px\"><span class=\"codicon codicon-pass-filled\" style=\"font-size:14px\"><\u002Fspan>连接成功<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ node.testFail }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;color:var(--red);display:flex;align-items:center;gap:5px\"><span class=\"codicon codicon-error\" style=\"font-size:14px\"><\u002Fspan>{{ node.testMsg }}<\u002Fspan><\u002Fsc-if>\n                    <span title=\"删除节点\" onclick=\"{{ node.onDelete }}\" class=\"codicon codicon-trash\" style=\"font-size:15px;padding:6px;border-radius:5px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover);color:var(--red)\"><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- fields -->\n                <div style=\"display:grid;grid-template-columns:1.5fr 1fr 0.6fr;gap:13px;margin-bottom:13px\">\n                  <div style=\"display:flex;flex-direction:column;gap:5px\">\n                    <label style=\"font-size:11px;color:var(--fg-muted)\">Host / IP 地址 <span style=\"color:var(--red)\">*<\u002Fspan><\u002Flabel>\n                    <input value=\"{{ node.host }}\" oninput=\"{{ node.onHost }}\" placeholder=\"192.168.1.x\" style=\"background:var(--input-bg);color:var(--input-fg);border:1px solid {{ node.hostBorder }};border-radius:4px;padding:6px 8px;font-size:13px;font-family:'SF Mono',Menlo,monospace\">\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:5px\">\n                    <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ node.userDot }};flex:none\"><\u002Fspan><label style=\"font-size:11px;color:{{ node.userLbl }}\">SSH 用户名<\u002Flabel><\u002Fdiv>\n                    <input value=\"{{ node.user }}\" oninput=\"{{ node.onUser }}\" placeholder=\"{{ node.userPh }}\" style=\"background:var(--input-bg);color:var(--input-fg);border:1px solid var(--input-border);border-radius:4px;padding:6px 8px;font-size:13px\">\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:5px\">\n                    <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ node.portDot }};flex:none\"><\u002Fspan><label style=\"font-size:11px;color:{{ node.portLbl }}\">SSH 端口<\u002Flabel><\u002Fdiv>\n                    <input value=\"{{ node.port }}\" oninput=\"{{ node.onPort }}\" placeholder=\"{{ node.portPh }}\" style=\"background:var(--input-bg);color:var(--input-fg);border:1px solid var(--input-border);border-radius:4px;padding:6px 8px;font-size:13px\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px\">\n                  <div style=\"display:flex;flex-direction:column;gap:5px\">\n                    <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ node.pwdDot }};flex:none\"><\u002Fspan><label style=\"font-size:11px;color:{{ node.pwdLbl }}\">密码<\u002Flabel><\u002Fdiv>\n                    <div style=\"display:flex;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;overflow:hidden\">\n                      <input type=\"{{ node.pwdType }}\" value=\"{{ node.pwd }}\" oninput=\"{{ node.onPwd }}\" placeholder=\"{{ node.pwdPh }}\" style=\"flex:1;min-width:0;background:transparent;color:var(--input-fg);border:none;padding:6px 8px;font-size:13px\">\n                      <span onclick=\"{{ node.onTogglePwd }}\" class=\"codicon {{ node.pwdEye }}\" style=\"font-size:14px;padding:7px 8px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover)\"><\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:5px\">\n                    <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ node.sudoDot }};flex:none\"><\u002Fspan><label style=\"font-size:11px;color:{{ node.sudoLbl }}\">sudo 密码<\u002Flabel><\u002Fdiv>\n                    <div style=\"display:flex;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;overflow:hidden\">\n                      <input type=\"{{ node.sudoType }}\" value=\"{{ node.sudo }}\" oninput=\"{{ node.onSudo }}\" placeholder=\"继承默认值\" style=\"flex:1;min-width:0;background:transparent;color:var(--input-fg);border:none;padding:6px 8px;font-size:13px\">\n                      <span onclick=\"{{ node.onToggleSudo }}\" class=\"codicon {{ node.sudoEye }}\" style=\"font-size:14px;padding:7px 8px;cursor:pointer;color:var(--fg-muted)\" style-hover=\"background:var(--list-hover)\"><\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- tags -->\n                <div style=\"display:flex;flex-direction:column;gap:5px\">\n                  <label style=\"font-size:11px;color:var(--fg-muted)\">Tags<\u002Flabel>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;padding:6px 8px;min-height:34px\">\n                    <sc-for list=\"{{ node.tagVMs }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                      <span style=\"display:inline-flex;align-items:center;gap:5px;background:var(--chip-bg);color:var(--chip-fg);padding:2px 6px 2px 8px;border-radius:4px;font-size:12px\">{{ tag.label }}<span onclick=\"{{ tag.onRemove }}\" class=\"codicon codicon-close\" style=\"font-size:11px;cursor:pointer;opacity:.7\"><\u002Fspan><\u002Fspan>\n                    <\u002Fsc-for>\n                    <input value=\"{{ node.draft }}\" oninput=\"{{ node.onDraft }}\" onkeydown=\"{{ node.onDraftKey }}\" placeholder=\"输入标签后回车…\" style=\"flex:1;min-width:120px;background:transparent;color:var(--input-fg);border:none;font-size:12px;padding:2px\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ notEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ addNode }}\" style=\"margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:var(--fg-muted);border:1.5px dashed var(--card-border);border-radius:8px;padding:13px;font-size:13px;cursor:pointer\" style-hover=\"border-color:var(--accent);color:var(--accent)\"><span class=\"codicon codicon-add\" style=\"font-size:15px\"><\u002Fspan>添加节点<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- DETAIL PANEL -->\n        <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n        <div data-screen-label=\"Node Detail Panel\" style=\"max-width:720px;margin:0 auto;padding:26px 32px 60px\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px\">\n            <span style=\"width:13px;height:13px;border-radius:50%;background:{{ detail.statusColor }}\"><\u002Fspan>\n            <h1 style=\"margin:0;font-size:24px;font-weight:600\">{{ detail.name }}<\u002Fh1>\n            <div style=\"display:flex;gap:5px;margin-left:4px\">\n              <sc-for list=\"{{ detail.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                <span style=\"font-size:11px;background:var(--chip-bg);color:var(--chip-fg);padding:2px 7px;border-radius:4px\">{{ tag }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <span style=\"margin-left:auto;font-size:12px;color:var(--fg-muted)\">{{ detail.statusText }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- info grid -->\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--card-border);border:1px solid var(--card-border);border-radius:8px;overflow:hidden\">\n            <div style=\"background:var(--card-bg);padding:14px 16px\"><div style=\"font-size:11px;color:var(--fg-muted);margin-bottom:5px\">Host / IP<\u002Fdiv><div style=\"font-family:'SF Mono',Menlo,monospace;font-size:14px\">{{ detail.host }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--card-bg);padding:14px 16px\"><div style=\"font-size:11px;color:var(--fg-muted);margin-bottom:5px\">SSH 用户<\u002Fdiv><div style=\"font-size:14px\">{{ detail.user }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--card-bg);padding:14px 16px\"><div style=\"font-size:11px;color:var(--fg-muted);margin-bottom:5px\">SSH 端口<\u002Fdiv><div style=\"font-size:14px\">{{ detail.port }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ detail.isError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:14px;background:rgba(241,76,76,.1);border:1px solid var(--red);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:10px;color:var(--red)\">\n              <span class=\"codicon codicon-error\" style=\"font-size:18px\"><\u002Fspan>\n              <div>\n                <div style=\"font-weight:600;font-size:13px\">连接失败<\u002Fdiv>\n                <div style=\"font-size:12px;margin-top:2px;opacity:.9\">{{ detail.error }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- SSH command -->\n          <div style=\"margin-top:14px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:14px 16px\">\n            <div style=\"font-size:11px;color:var(--fg-muted);margin-bottom:6px\">SSH 命令<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <code style=\"flex:1;font-family:'SF Mono',Menlo,monospace;font-size:13px;color:var(--fg);background:var(--input-bg);padding:8px 10px;border-radius:4px;overflow-x:auto;white-space:nowrap\">{{ detail.sshCmd }}<\u002Fcode>\n              <span onclick=\"{{ detail.onCopy }}\" title=\"复制\" class=\"codicon codicon-copy\" style=\"font-size:16px;padding:8px;cursor:pointer;color:var(--fg-muted);border-radius:5px;flex:none\" style-hover=\"background:var(--list-hover);color:var(--accent)\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- actions -->\n          <div style=\"display:flex;gap:10px;margin-top:20px\">\n            <button onclick=\"{{ detail.onSSH }}\" style=\"display:flex;align-items:center;gap:7px;background:var(--btn-bg);color:var(--btn-fg);border:none;border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer\" style-hover=\"background:var(--btn-bg-hover)\"><span class=\"codicon codicon-terminal\" style=\"font-size:14px\"><\u002Fspan>在终端中 SSH<\u002Fbutton>\n            <button onclick=\"{{ openConfig }}\" style=\"display:flex;align-items:center;gap:7px;background:var(--btn2-bg);color:var(--btn2-fg);border:none;border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer\" style-hover=\"background:var(--btn2-bg-hover)\"><span class=\"codicon codicon-edit\" style=\"font-size:14px\"><\u002Fspan>编辑配置<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- footer for config -->\n      <sc-if value=\"{{ isConfi e.target.value),\n        onPwd: e => this.updNode(n.id, 'pwd', e.target.value),\n        onSudo: e => this.updNode(n.id, 'sudo', e.target.value),\n        onTogglePwd: () => this.togglePwd('p' + n.id),\n        onToggleSudo: () => this.togglePwd('s' + n.id),\n        onDelete: () => this.deleteNode(n.id),\n        onDraft: e => this.setState(s => ({ drafts: { ...s.drafts, [n.id]: e.target.value } })),\n        onDraftKey: e => this.draftKey(n.id, e),\n      };\n    });\n  }\n\n  buildDetail() {\n    const n = this.state.nodes.find(x => x.name === this.state.selected) || this.state.nodes[0];\n    if (!n) return { name: '—', host: '—', user: '—', port: '—', tags: [], statusColor: 'var(--gray)', statusText: '—', sshCmd: '—', isError: false, error: '', onSSH: () => {}, onCopy: () => {} };\n    const meta = this.statusMeta(n.status);\n    return {\n      name: n.name, host: n.host, user: this.eff(n, 'user'), port: this.eff(n, 'port'),\n      tags: n.tags || [], statusColor: meta.color, statusText: meta.text,\n      isError: n.status === 'error', error: n.error || '',\n      sshCmd: this.sshCmd(n),\n      onSSH: () => this.toast('终端执行: ' + this.sshCmd(n)),\n      onCopy: () => { try { navigator.clipboard.writeText(this.sshCmd(n)); } catch (e) {} this.toast('已复制: ' + this.sshCmd(n)); },\n    };\n  }\n\n  renderVals() {\n    const st = this.state;\n    const isConfig = st.view === 'config';\n    const isDetail = st.view === 'detail';\n    const tags = [...new Set(this.state.nodes.flatMap(n => n.tags || []))];\n    const filterOptions = [{ label: '全部节点', icon: 'codicon-clear-all', onPick: () => this.setState({ filterTag: null, showFilter: false }) }]\n      .concat(tags.map(t => ({ label: t, icon: 'codicon-tag', onPick: () => this.setState({ filterTag: t, showFilter: false }) })));\n    const counts = this.state.nodes.reduce((a, n) => { a[n.status] = (a[n.status] || 0) + 1; return a; }, {});\n    const online = (counts.online || 0) + (counts.warn || 0);\n    const detail = this.buildDetail();\n    const segActive = (on) => ({ bg: on ? 'rgba(55,148,255,.9)' : 'transparent', fg: on ? '#fff' : '#bdbdbd' });\n    const sd = segActive(st.statusStyle === 'dot'), sb = segActive(st.statusStyle === 'bar'), si = segActive(st.statusStyle === 'icon');\n\n    return {\n      themeAttr: st.theme,\n      treeRows: this.buildTreeRows(),\n      showFilter: st.showFilter,\n      hasFilter: !!st.filterTag,\n      filterLabel: '过滤: ' + (st.filterTag || ''),\n      clearFilter: () => this.setState({ filterTag: null }),\n      filterOptions,\n      refreshAll: () => { this.toast('已刷新全部节点状态'); },\n      toggleFilter: () => this.setState(s => ({ showFilter: !s.showFilter })),\n      openConfig: () => this.setState({ view: 'config', ctx: null }),\n      closeOverlays: () => this.closeOverlays(),\n      preventCtx: (e) => { e.preventDefault(); this.closeOverlays(); },\n\n      isConfig, isDetail,\n      breadcrumb: isConfig ? 'nodes.yaml' : detail.name,\n      showConfig: () => this.setState({ view: 'config' }),\n      showDetail: () => this.setState({ view: 'detail' }),\n      tab: {\n        configBg: isConfig ? 'var(--tab-active-bg)' : 'var(--tab-inactive-bg)',\n        configFg: isConfig ? 'var(--tab-active-fg)' : 'var(--tab-inactive-fg)',\n        configTop: isConfig ? 'var(--tab-top)' : 'transparent',\n        detailBg: isDetail ? 'var(--tab-active-bg)' : 'var(--tab-inactive-bg)',\n        detailFg: isDetail ? 'var(--tab-active-fg)' : 'var(--tab-inactive-fg)',\n        detailTop: isDetail ? 'var(--tab-top)' : 'transparent',\n      },\n\n      defaults: {\n        user: st.defaults.user, port: st.defaults.port, pwd: st.defaults.pwd, sudo: st.defaults.sudo,\n        pwdType: st.defaults.pwdShow ? 'text' : 'password',\n        pwdEye: st.defaults.pwdShow ? 'codicon-eye-closed' : 'codicon-eye',\n        sudoType: st.defaults.sudoShow ? 'text' : 'password',\n        sudoEye: st.defaults.sudoShow ? 'codicon-eye-closed' : 'codicon-eye',\n        onUser: e => this.updDefault('user', e.target.value),\n        onPort: e => this.updDefault('port', e.target.value),\n        onPwd: e => this.updDefault('pwd', e.target.value),\n        onSudo: e => this.updDefault('sudo', e.target.value),\n        onTogglePwd: () => this.updDefault('pwdShow', !st.defaults.pwdShow),\n        onToggleSudo: () => this.updDefault('sudoShow', !st.defaults.sudoShow),\n      },\n      nodeVMs: this.buildNodeVMs(),\n      nodeCount: this.state.nodes.length,\n      isEmpty: this.state.nodes.length === 0,\n      notEmpty: this.state.nodes.length > 0,\n      addNode: () => this.addNode(),\n      testAll: () => this.testAll(),\n      saveCfg: () => this.saveCfg(),\n      resetCfg: () => this.resetCfg(),\n\n      detail,\n\n      statusSummary: online + '/' + this.state.nodes.length + ' 在线' + (counts.error ? ' · ' + counts.error + ' 失败' : ''),\n\n      tip: st.tip ? { show: true, name: st.tip.name, color: st.tip.color, rows: st.tip.rows, x: st.tip.x + 'px', y: st.tip.y + 'px' } : { show: false },\n      ctx: st.ctx ? { show: true, x: st.ctx.x + 'px', y: Math.min(st.ctx.y, window.innerHeight - 200) + 'px', items: this.ctxItems() } : { show: false },\n      toast: st.toast ? { show: true, msg: st.toast } : { show: false },\n\n      setDark: () => this.setState({ theme: 'dark' }),\n      setLight: () => this.setState({ theme: 'light' }),\n      ssDot: () => this.setState({ statusStyle: 'dot' }),\n      ssBar: () => this.setState({ statusStyle: 'bar' }),\n      ssIcon: () => this.setState({ statusStyle: 'icon' }),\n      seg: {\n        darkBg: st.theme === 'dark' ? 'rgba(55,148,255,.9)' : 'transparent', darkFg: st.theme === 'dark' ? '#fff' : '#bdbdbd',\n        lightBg: st.theme === 'light' ? 'rgba(55,148,255,.9)' : 'transparent', lightFg: st.theme === 'light' ? '#fff' : '#bdbdbd',\n        dotBg: sd.bg, dotFg: sd.fg, barBg: sb.bg, barFg: sb.fg, iconBg: si.bg, iconFg: si.fg,\n        cfgBg: isConfig ? 'rgba(55,148,255,.9)' : 'transparent', cfgFg: isConfig ? '#fff' : '#bdbdbd',\n        detBg: isDetail ? 'rgba(55,148,255,.9)' : 'transparent', detFg: isDetail ? '#fff' : '#bdbdbd',\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
